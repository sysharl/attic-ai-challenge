name: Build and push Docker image

on:
  push:
    branches:
      - main
  pull_request:         # Added: Ensures tests run on PRs to catch bugs early
    branches:
      - main
  workflow_dispatch:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # Using stable v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pre-commit pyright

      - name: Run pre-commit hooks
        # Using --show-diff-on-failure helps you debug linting errors in the GH logs
        run: pre-commit run --all-files --show-diff-on-failure

      - name: Run pyright
        run: pyright

      # - name: Run Pytest
      #   run: python -m pytest

  build_and_push:
    runs-on: ubuntu-latest
    # needs: lint-test  # Uncomment this once your linting/tests are passing
    
    # Only push to Docker Hub on actual merges to main, not on every PR update
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          # Note: I changed DOCKER_USERNAME to secrets to match your password line
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Note: Using vars for username here as per your original logic
          tags: ${{ secrets.DOCKER_USERNAME }}/${{ github.event.repository.name }}:latest