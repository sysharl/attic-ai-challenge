name: Build and push Docker image

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  # unit-tests:            
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v4

  #     - name: Set up Python
  #       uses: actions/setup-python@v5
  #       with:
  #         python-version: '3.11'

  #     - name: Install dependencies
  #       run: |
  #         python -m pip install --upgrade pip
  #         pip install -r requirements.txt
  #         pip install pytest httpx  # Ensure testing tools are installed

  #     - name: Run Pytest
  #       run: python -m pytest -v

  build_and_push:
    runs-on: ubuntu-latest
    # needs: unit-tests  # Uncomment this once your linting/tests are passing

    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch')

    steps:
    - uses: actions/checkout@v4
    - name: docker login
      env:
        DOCKER_USER: ${{secrets.DOCKER_USERNAME}}
        DOCKER_PASSWORD: ${{secrets.DOCKER_PASSWORD}}
      run: |
        docker login -u $DOCKER_USERNAME -p $DOCKER_PASSWORD
    - name: Build the Docker image
      run: docker build . --no-cache --file Dockerfile --tag { secrets.DOCKER_USERNAME }/rag-backend-api:latest

    - name: Docker Push
      run: docker push { secrets.DOCKER_USERNAME }/rag-backend-api:latest